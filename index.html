<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wild Growth Media</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<header>
  <h1>Wild Growth Media</h1>
  <nav>
    <a href="#work">Work</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>
</header>



<section id="work" class="grid">

  <div class="project">
  <div class="video-wrapper">
    <img src="YOUR_THUMBNAIL.jpg" class="thumbnail">

    <iframe 
      src="https://player.vimeo.com/video/YOUR_VIDEO_ID?background=1&autoplay=1&loop=1&muted=1"
      frameborder="0"
      allow="autoplay; fullscreen"
      class="video">
    </iframe>
  </div>

  <h3>Your Film Title</h3>
    
</div>

</section>

<section id="about" class="about">
  <h2>About</h2>
  <p>Wild Growth Media is a full-service production company that develops original documentaries with a primary focus on about social and ecological justice.</p>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>Email: your@email.com</p>
</section>

<div id="modal" class="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <iframe id="videoFrame" src="" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
